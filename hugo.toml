baseURL = "https://prudhvirajn.github.io"
languageCode = "en-us"
title = "Prud's Log"
theme = "PaperMod"
publishDir = "docs"

# Enable math rendering
[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      math = true
      footnote = true
    [markup.goldmark.renderer]
      unsafe = true

[params]
  # SEO and social
  author = "Prudhviraj Naidu"
  description = "PhD student in Computer Science with focus on machine learning and software engineering"
  keywords = ["Computer Science", "Machine Learning", "Software Engineering", "Research"]
  defaultTheme = "light"
  disableThemeToggle = true
  
  # Profile settings
  [params.profileMode]
    enabled = false
  
  # Enable search
  fuseOpts.keys = ["title", "permalink", "summary", "content"]
  
  # Enable math rendering with KaTeX
  math = true
  
  [params.footer]
    text = "Inspired by [Lil'Log](https://lilianweng.github.io/)"
  
  # Social links
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/prudhvirajn"
  
  [[params.socialIcons]]
    name = "email"
    url = "mailto:prnaidu@ucsd.edu"

# Menu configuration
[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 10
  
  [[menu.main]]
    identifier = "blog"
    name = "Writing"
    url = "/posts/"
    weight = 20
  
  [[menu.main]]
    identifier = "cv"
    name = "CV"
    url = "/cv/"
    weight = 30

# Enable tags and categories
[taxonomies]
  tag = "tags"
  category = "categories"

# Configure output formats
[outputs]
  home = ["HTML", "RSS", "JSON"]
